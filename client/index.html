<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://gcbuommyucwhrznqkuuf.supabase.co/storage/v1/object/public/GlobalFX/Logo.png" />
    <!-- Robust mobile viewport: no forced scaling, respects user zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- SEO -->
    <title>BitLance — Intelligent Crypto Growth Platform</title>
    <meta name="description" content="Grow your capital through intelligent algorithmic crypto trading. Join 50,000+ members earning daily returns on BitLance — your AI-powered crypto growth engine." />
    <meta name="keywords" content="crypto investment, bitcoin trading, daily returns, referral income, USDT investment platform, AI crypto, BitLance" />
    <meta name="author" content="BitLance" />
    <link rel="canonical" href="https://bitlance.pro" />

    <!-- Open Graph -->
    <meta property="og:title" content="BitLance — Intelligent Crypto Growth Platform" />
    <meta property="og:description" content="Earn daily returns through AI-powered crypto and algorithmic trading. Join BitLance today." />
    <meta property="og:url" content="https://bitlance.pro" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://gcbuommyucwhrznqkuuf.supabase.co/storage/v1/object/public/GlobalFX/Logo.png" />

    <!-- DNS prefetch for third-party scripts -->
    <link rel="dns-prefetch" href="https://s3.tradingview.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Preconnect to font origins (eliminates round-trip latency) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Non-render-blocking font load -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" />
    </noscript>
  </head>
